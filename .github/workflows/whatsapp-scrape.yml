name: WhatsApp Scraping

on:
  schedule:
    # Runs at 00:00, 08:00, and 16:00 UTC every day
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:
    inputs:
      params:
        description: 'parameters to pass to the script'
        required: false
        type: string
        default: ''

jobs:
  scrape-whatsapp:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: whatsapp-scrape
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: scrape
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          WHATSAPP2SQLITE_R2_ACCESS_KEY_ID: ${{ secrets.WHATSAPP2SQLITE_R2_ACCESS_KEY_ID }}
          WHATSAPP2SQLITE_R2_SECRET_ACCESS_KEY: ${{ secrets.WHATSAPP2SQLITE_R2_SECRET_ACCESS_KEY }}
          WHATSAPP2SQLITE_R2_BUCKET_NAME: ${{ secrets.WHATSAPP2SQLITE_R2_BUCKET_NAME }}
          WHATSAPP2SQLITE_R2_ENDPOINT: ${{ secrets.WHATSAPP2SQLITE_R2_ENDPOINT }}
        run: bun run scripts/whatsapp-scraper.ts ${{ github.event.inputs.params }}

  deduplicate:
    if: ${{ always() }}
    needs: [scrape-whatsapp]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Remove duplicates
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: bun run scripts/remove-duplicates.ts ${{ github.event.inputs.params }}
